<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quake (WebAssembly)</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #c0c0c0;
    font-family: monospace;
    height: 100%;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100%;
    box-sizing: border-box;
    padding: 16px;
  }
  h1 {
    font-size: 18px;
    letter-spacing: 4px;
    color: #b03020;
    margin: 8px 0 4px;
  }
  #hint { font-size: 12px; color: #888; margin-bottom: 12px; }
  /* The stage wraps the canvas so post-process overlays can sit on top of it
     at the exact same size. */
  #stage { position: relative; display: inline-block; line-height: 0; }
  canvas.emscripten {
    border: 1px solid #333;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #000;
    width: 640px;
    height: 400px;
    max-width: 95vw;
  }
  /* CRT scanline + vignette overlay (pure CSS, toggled on #stage). */
  #crt-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: none;
    z-index: 2;
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0.0) 0px,
        rgba(0,0,0,0.0) 1px,
        rgba(0,0,0,0.35) 2px,
        rgba(0,0,0,0.35) 3px),
      radial-gradient(ellipse at center,
        rgba(0,0,0,0) 55%,
        rgba(0,0,0,0.55) 100%);
    mix-blend-mode: multiply;
    animation: crt-flicker 6s infinite steps(60);
  }
  #stage.crt #crt-overlay { display: block; }
  @keyframes crt-flicker { 0%,97% { opacity: 1; } 98% { opacity: 0.92; } 100% { opacity: 1; } }
  /* ASCII overlay canvas, drawn from the engine's downsampled luminance grid. */
  #ascii-overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background: #000;
    display: none;
    z-index: 1;
  }
  #stage.ascii #ascii-overlay { display: block; }
  #status {
    margin-top: 10px;
    font-size: 12px;
    min-height: 16px;
  }
  #progress { width: 320px; max-width: 90vw; height: 6px; }
  #controls { margin-top: 10px; }
  button.qbtn {
    background: #1a1a1a;
    color: #c0c0c0;
    border: 1px solid #444;
    font-family: monospace;
    font-size: 12px;
    padding: 5px 14px;
    cursor: pointer;
  }
  button.qbtn:hover { background: #2a2a2a; border-color: #b03020; }
  button.qbtn:disabled { opacity: 0.4; cursor: default; }
  button.qbtn.active { background: #b03020; color: #fff; border-color: #e05a30; }
  /* Recording state for the GIF button: red, pulsing dot. */
  button.qbtn.rec {
    background: #b03020;
    color: #fff;
    border-color: #e05a30;
    animation: rec-pulse 1s infinite steps(1, end);
  }
  @keyframes rec-pulse { 0%,50% { opacity: 1; } 51%,100% { opacity: 0.55; } }
  #controls button.qbtn { margin: 2px; }
  #capture { display: inline-block; margin-left: 8px; }
  /* Anchored toast confirming a saved capture. */
  #capture-toast {
    position: fixed;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%);
    background: #1a1a1a;
    color: #c0c0c0;
    border: 1px solid #b03020;
    padding: 8px 16px;
    font-size: 12px;
    border-radius: 3px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    z-index: 10;
  }
  #capture-toast.show { opacity: 1; }
  #filters { display: inline-block; margin-left: 8px; }
  /* When the canvas is the fullscreen element, fill the screen while keeping
     the 8:5 aspect ratio (canvas is a replaced element, so one auto dimension
     preserves its intrinsic ratio). */
  canvas.emscripten:fullscreen {
    width: auto;
    height: 100vh;
    max-width: 100vw;
    max-height: 100vh;
    margin: auto;
    border: none;
    background: #000;
  }
  #output {
    width: 640px;
    max-width: 95vw;
    height: 120px;
    margin-top: 10px;
    background: #0a0a0a;
    color: #6a6;
    border: 1px solid #222;
    font-size: 11px;
    resize: vertical;
  }
</style>
</head>
<body>
<div id="wrap">
  <h1>QUAKE</h1>
  <div id="hint">Click the canvas to capture the mouse &middot; ESC for menu &middot; ` for console &middot; double-click for fullscreen &middot; try the filters &amp; FX below (Red Hot, Synthwave, Matrix, CRT, ASCII) &middot; grab a Shot or record a GIF to share &middot; enable music from the in-game Options menu</div>
  <div id="stage">
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <div id="crt-overlay"></div>
    <canvas id="ascii-overlay"></canvas>
  </div>
  <div id="status">Loading&hellip;</div>
  <progress hidden id="progress" max="100" value="0"></progress>
  <div id="controls">
    <button class="qbtn" disabled id="fullscreen-btn" type="button">Fullscreen</button>
    <span id="filters">
      <button class="qbtn filter-btn" disabled type="button" data-filter="0">Normal</button>
      <button class="qbtn filter-btn" disabled type="button" data-filter="1">&#128293; Red Hot</button>
      <button class="qbtn filter-btn" disabled type="button" data-filter="2">&#127750; Synthwave</button>
      <button class="qbtn filter-btn" disabled type="button" data-filter="3">&#129001; Matrix</button>
    </span>
    <span id="fx">
      <button class="qbtn" disabled id="crt-btn" type="button">&#128250; CRT</button>
      <button class="qbtn" disabled id="ascii-btn" type="button">&#9636; ASCII</button>
    </span>
    <span id="capture">
      <button class="qbtn" disabled id="shot-btn" type="button" title="Save a PNG screenshot">&#128247; Shot</button>
      <button class="qbtn" disabled id="gif-btn" type="button" title="Record an animated GIF clip">&#127916; GIF</button>
    </span>
  </div>
  <div id="capture-toast"></div>
  <textarea id="output" readonly></textarea>
</div>

<script type="text/javascript">
  var statusElement = document.getElementById('status');
  var progressElement = document.getElementById('progress');
  var outputElement = document.getElementById('output');
  var canvasElement = document.getElementById('canvas');

  var Module = {
    canvas: (function () {
      // Reset the WebGL/2D context if it is lost.
      canvasElement.addEventListener('webglcontextlost', function (e) {
        alert('WebGL context lost. You will need to reload the page.');
        e.preventDefault();
      }, false);
      return canvasElement;
    })(),
    print: function (text) {
      if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
      console.log(text);
      if (outputElement) {
        outputElement.value += text + "\n";
        outputElement.scrollTop = outputElement.scrollHeight;
      }
    },
    printErr: function (text) {
      if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
      console.error(text);
    },
    setStatus: function (text) {
      if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
      if (text === Module.setStatus.last.text) return;
      var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
      var now = Date.now();
      if (m && now - Module.setStatus.last.time < 30) return;
      Module.setStatus.last.time = now;
      Module.setStatus.last.text = text;
      if (m) {
        text = m[1];
        progressElement.value = parseInt(m[2]) * 100;
        progressElement.max = parseInt(m[4]) * 100;
        progressElement.hidden = false;
      } else {
        progressElement.value = null;
        progressElement.max = null;
        progressElement.hidden = true;
      }
      statusElement.innerHTML = text;
    },
    totalDependencies: 0,
    monitorRunDependencies: function (left) {
      this.totalDependencies = Math.max(this.totalDependencies, left);
      Module.setStatus(left ?
        'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')' :
        'All downloads complete.');
    }
  };

  Module.setStatus('Downloading...');
  window.onerror = function () {
    Module.setStatus('Exception thrown, see JavaScript console');
  };

  // ---- Fullscreen support ----
  (function () {
    var btn = document.getElementById('fullscreen-btn');

    function goFullscreen() {
      // Prefer the standard Fullscreen API on the canvas. Emscripten's
      // Module.requestFullscreen helper isn't present in all builds, so fall
      // back to it only if available. We don't lock the pointer here; the game
      // captures the mouse on click as usual.
      var c = canvasElement;
      if (c.requestFullscreen) {
        c.requestFullscreen();
      } else if (c.webkitRequestFullscreen) {
        c.webkitRequestFullscreen();
      } else if (Module && typeof Module.requestFullscreen === 'function') {
        Module.requestFullscreen(false, true);
      }
      c.focus();
    }

    btn.addEventListener('click', goFullscreen);

    // Enable the button once the wasm runtime is up.
    var prevInit = Module.onRuntimeInitialized;
    Module.onRuntimeInitialized = function () {
      if (prevInit) prevInit();
      btn.disabled = false;
    };

    // Double-clicking the canvas also goes fullscreen.
    canvasElement.addEventListener('dblclick', goFullscreen);
  })();

  // ---- Video filters (palette remaps in the engine) ----
  (function () {
    var buttons = Array.prototype.slice.call(
      document.querySelectorAll('.filter-btn'));

    function setFilter(n) {
      try {
        Module.ccall('Web_SetFilter', null, ['number'], [n]);
      } catch (e) {
        console.warn('Web_SetFilter unavailable:', e);
      }
      buttons.forEach(function (b) {
        b.classList.toggle('active', +b.dataset.filter === n);
      });
      canvasElement.focus();
    }

    buttons.forEach(function (b) {
      b.addEventListener('click', function () {
        setFilter(+b.dataset.filter);
      });
    });

    var prevInit = Module.onRuntimeInitialized;
    Module.onRuntimeInitialized = function () {
      if (prevInit) prevInit();
      buttons.forEach(function (b) { b.disabled = false; });
      buttons[0].classList.add('active');
    };
  })();

  // ---- CRT overlay (pure CSS) ----
  (function () {
    var stage = document.getElementById('stage');
    var btn = document.getElementById('crt-btn');
    btn.addEventListener('click', function () {
      var on = stage.classList.toggle('crt');
      btn.classList.toggle('active', on);
      canvasElement.focus();
    });
    var prevInit = Module.onRuntimeInitialized;
    Module.onRuntimeInitialized = function () {
      if (prevInit) prevInit();
      btn.disabled = false;
    };
  })();

  // ---- ASCII overlay (engine downsamples; JS draws glyphs) ----
  (function () {
    var stage = document.getElementById('stage');
    var btn = document.getElementById('ascii-btn');
    var overlay = document.getElementById('ascii-overlay');
    var ctx = overlay.getContext('2d');
    var ramp = ' .,:;irsXA253hMHGS#9B&@';
    var cols = 0, rows = 0, cellW = 8, cellH = 9;
    var on = false, rafId = 0;

    // Brightness curve: lift midtones/shadows so the glyphs read clearly even
    // in Quake's dim scenes.
    var lut = new Uint8Array(256);
    for (var li = 0; li < 256; li++)
      lut[li] = Math.min(255, Math.round(255 * Math.pow(li / 255, 0.55) + 12));

    function draw() {
      if (!on) return;
      var ptr = Module._Web_GetAscii();
      var heap = Module.HEAPU8;	// re-fetch: heap may grow/detach
      var stride = cols * 3;
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, overlay.width, overlay.height);
      ctx.textBaseline = 'top';
      ctx.font = cellH + 'px monospace';
      for (var r = 0; r < rows; r++) {
        var rowbase = ptr + r * stride;
        for (var c = 0; c < cols; c++) {
          var o = rowbase + c * 3;
          var R = heap[o], G = heap[o + 1], B = heap[o + 2];
          var lum = (R * 77 + G * 150 + B * 29) >> 8;	// 0..255
          var bright = lut[lum];
          var idx = (bright * (ramp.length - 1) / 255) | 0;
          var ch = ramp[idx];
          if (ch === ' ') continue;
          // Keep the theme hue but boost brightness for visibility.
          var s = bright / (lum || 1);
          var rr = R * s, gg = G * s, bb = B * s;
          if (rr > 255) rr = 255;
          if (gg > 255) gg = 255;
          if (bb > 255) bb = 255;
          ctx.fillStyle = 'rgb(' + (rr | 0) + ',' + (gg | 0) + ',' + (bb | 0) + ')';
          ctx.fillText(ch, c * cellW, r * cellH);
        }
      }
      rafId = requestAnimationFrame(draw);
    }

    btn.addEventListener('click', function () {
      on = !on;
      btn.classList.toggle('active', on);
      stage.classList.toggle('ascii', on);
      Module.ccall('Web_AsciiEnable', null, ['number'], [on ? 1 : 0]);
      if (on) {
        cols = Module._Web_AsciiCols();
        rows = Module._Web_AsciiRows();
        overlay.width = cols * cellW;
        overlay.height = rows * cellH;
        rafId = requestAnimationFrame(draw);
      } else if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = 0;
      }
      canvasElement.focus();
    });

    var prevInit = Module.onRuntimeInitialized;
    Module.onRuntimeInitialized = function () {
      if (prevInit) prevInit();
      btn.disabled = false;
    };
  })();

  // ---- Screenshot + GIF capture (one-click shareable clips) ----
  (function () {
    var stage = document.getElementById('stage');
    var asciiOverlay = document.getElementById('ascii-overlay');
    var shotBtn = document.getElementById('shot-btn');
    var gifBtn = document.getElementById('gif-btn');
    var toast = document.getElementById('capture-toast');

    var GIF_FPS = 12;          // frames per second captured for the GIF
    var GIF_MAX_SEC = 8;       // auto-stop after this many seconds
    var GIF_MAX_WIDTH = 320;   // downscale wide canvases to keep files small

    var stream = null, video = null;
    var scratch = document.createElement('canvas');
    var sctx = scratch.getContext('2d', { willReadFrequently: true });

    var captureSupported = typeof canvasElement.captureStream === 'function';

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(function () {
        toast.classList.remove('show');
      }, 2200);
    }

    // Lazily wire a MediaStream off the WebGL canvas. captureStream() reads the
    // composited frame regardless of preserveDrawingBuffer, so it works where
    // canvas.toDataURL() would come back blank.
    function ensureStream() {
      if (stream) {
        return video.readyState >= 2 ? Promise.resolve()
          : new Promise(function (r) { video.addEventListener('loadeddata', function () { r(); }, { once: true }); });
      }
      stream = canvasElement.captureStream(30);
      video = document.createElement('video');
      video.muted = true;
      video.playsInline = true;
      video.srcObject = stream;
      return video.play().then(function () {
        if (video.videoWidth) return;
        return new Promise(function (r) { video.addEventListener('loadeddata', function () { r(); }, { once: true }); });
      });
    }

    // When ASCII mode is on, the visible frame lives on its own 2D canvas;
    // otherwise we grab the game frame from the stream's <video>.
    function asciiActive() { return stage.classList.contains('ascii'); }
    function baseWidth() { return asciiActive() ? asciiOverlay.width : (video && video.videoWidth) || canvasElement.width; }
    function baseHeight() { return asciiActive() ? asciiOverlay.height : (video && video.videoHeight) || canvasElement.height; }

    // Composite the current frame (game/ASCII base + optional CRT styling) into
    // a 2D context so screenshots and GIFs match what the player sees.
    function compositeFrame(ctx, w, h) {
      if (asciiActive()) {
        ctx.drawImage(asciiOverlay, 0, 0, w, h);
      } else {
        ctx.drawImage(video, 0, 0, w, h);
      }
      if (stage.classList.contains('crt')) drawCrt(ctx, w, h);
    }

    // Approximate the CSS CRT overlay (scanlines + vignette) so it survives into
    // the exported image/clip.
    function drawCrt(ctx, w, h) {
      ctx.save();
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = '#000';
      for (var y = 0; y < h; y += 3) ctx.fillRect(0, y + 1, w, 1);
      var g = ctx.createRadialGradient(w / 2, h / 2, Math.min(w, h) * 0.3, w / 2, h / 2, Math.max(w, h) * 0.62);
      g.addColorStop(0, 'rgba(0,0,0,0)');
      g.addColorStop(1, 'rgba(0,0,0,0.55)');
      ctx.globalAlpha = 1;
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, w, h);
      ctx.restore();
    }

    function timestamp() {
      var d = new Date();
      function p(n) { return ('0' + n).slice(-2); }
      return d.getFullYear() + p(d.getMonth() + 1) + p(d.getDate()) + '-' +
        p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds());
    }

    function download(blobOrUrl, name) {
      var url = typeof blobOrUrl === 'string' ? blobOrUrl : URL.createObjectURL(blobOrUrl);
      var a = document.createElement('a');
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      if (typeof blobOrUrl !== 'string') setTimeout(function () { URL.revokeObjectURL(url); }, 4000);
    }

    // ---- Screenshot ----
    function takeShot() {
      ensureStream().then(function () {
        var w = baseWidth(), h = baseHeight();
        scratch.width = w; scratch.height = h;
        compositeFrame(sctx, w, h);
        scratch.toBlob(function (blob) {
          download(blob, 'quake-' + timestamp() + '.png');
          showToast('Screenshot saved \u2713');
        }, 'image/png');
        canvasElement.focus();
      });
    }

    // ---- GIF recording ----
    var recording = false, frames = [], gifW = 0, gifH = 0, recTimer = 0, recStart = 0;

    function startRecording() {
      ensureStream().then(function () {
        var bw = baseWidth(), bh = baseHeight();
        var scale = Math.min(1, GIF_MAX_WIDTH / bw);
        gifW = Math.max(1, Math.round(bw * scale));
        gifH = Math.max(1, Math.round(bh * scale));
        scratch.width = gifW; scratch.height = gifH;
        frames = [];
        recording = true;
        recStart = Date.now();
        gifBtn.classList.add('rec');
        var interval = Math.round(1000 / GIF_FPS);
        recTimer = setInterval(function () {
          compositeFrame(sctx, gifW, gifH);
          frames.push(sctx.getImageData(0, 0, gifW, gifH).data);
          var secs = (Date.now() - recStart) / 1000;
          gifBtn.innerHTML = '&#9210; ' + secs.toFixed(1) + 's';
          if (secs >= GIF_MAX_SEC) stopRecording();
        }, interval);
      });
    }

    function stopRecording() {
      if (!recording) return;
      recording = false;
      clearInterval(recTimer);
      gifBtn.classList.remove('rec');
      gifBtn.disabled = true;
      gifBtn.innerHTML = 'Encoding\u2026';
      // Defer so the button repaints before the (synchronous) encode.
      setTimeout(function () {
        try {
          var bytes = encodeGif(frames, gifW, gifH, Math.round(100 / GIF_FPS));
          download(new Blob([bytes], { type: 'image/gif' }), 'quake-' + timestamp() + '.gif');
          showToast('GIF saved \u2713 (' + frames.length + ' frames)');
        } catch (e) {
          console.error('GIF encode failed:', e);
          showToast('GIF encode failed \u2717');
        }
        frames = [];
        gifBtn.disabled = false;
        gifBtn.innerHTML = '&#127916; GIF';
        canvasElement.focus();
      }, 30);
    }

    shotBtn.addEventListener('click', takeShot);
    gifBtn.addEventListener('click', function () {
      if (recording) stopRecording(); else startRecording();
    });

    var prevInit = Module.onRuntimeInitialized;
    Module.onRuntimeInitialized = function () {
      if (prevInit) prevInit();
      if (captureSupported) {
        shotBtn.disabled = false;
        gifBtn.disabled = false;
      } else {
        shotBtn.title = gifBtn.title = 'Capture not supported in this browser';
      }
    };

    // ---- Minimal, dependency-free animated-GIF encoder (GIF89a + LZW) ----
    // Quake's software renderer is 8-bit palettized, so a single 256-color
    // global palette (built via median cut over sampled frames) reproduces the
    // clip essentially loss-free while keeping files small.
    function encodeGif(frameDatas, width, height, delayCs) {
      var palette = buildPalette(frameDatas, width, height);
      var indexed = frameDatas.map(function (data) {
        return quantizeFrame(data, palette);
      });

      var out = [];
      function byte(b) { out.push(b & 0xff); }
      function word(w) { byte(w); byte(w >> 8); }
      function str(s) { for (var i = 0; i < s.length; i++) byte(s.charCodeAt(i)); }

      str('GIF89a');
      word(width); word(height);
      byte(0xf7);   // global color table, 256 entries, 8 bits/color
      byte(0); byte(0);
      for (var i = 0; i < 256; i++) {
        var c = palette[i] || [0, 0, 0];
        byte(c[0]); byte(c[1]); byte(c[2]);
      }

      // NETSCAPE2.0 application extension for infinite looping.
      byte(0x21); byte(0xff); byte(11); str('NETSCAPE2.0');
      byte(3); byte(1); word(0); byte(0);

      for (var f = 0; f < indexed.length; f++) {
        // Graphic control extension (frame delay).
        byte(0x21); byte(0xf9); byte(4); byte(0); word(delayCs); byte(0); byte(0);
        // Image descriptor.
        byte(0x2c); word(0); word(0); word(width); word(height); byte(0);
        byte(8); // LZW minimum code size
        lzwEncode(indexed[f], 8, out);
      }
      byte(0x3b); // trailer
      return new Uint8Array(out);
    }

    function buildPalette(frameDatas, width, height) {
      // Sample pixels across all frames (cap the work) and median-cut to 256.
      var samples = [];
      var target = 16000;
      var totalPx = frameDatas.length * width * height;
      var step = Math.max(1, Math.floor(totalPx / target));
      var counter = 0;
      for (var f = 0; f < frameDatas.length; f++) {
        var d = frameDatas[f];
        for (var p = 0; p < d.length; p += 4) {
          if (counter++ % step === 0) samples.push([d[p], d[p + 1], d[p + 2]]);
        }
      }
      var pal = medianCut(samples, 256);
      while (pal.length < 256) pal.push([0, 0, 0]);
      return pal;
    }

    function medianCut(pixels, maxColors) {
      if (!pixels.length) return [[0, 0, 0]];
      var boxes = [makeBox(pixels)];
      while (boxes.length < maxColors) {
        // Split the box with the largest single-channel spread.
        var idx = -1, best = -1;
        for (var i = 0; i < boxes.length; i++) {
          if (boxes[i].pixels.length < 2) continue;
          if (boxes[i].range > best) { best = boxes[i].range; idx = i; }
        }
        if (idx < 0) break;
        var box = boxes[idx];
        var axis = box.axis;
        box.pixels.sort(function (a, b) { return a[axis] - b[axis]; });
        var mid = box.pixels.length >> 1;
        boxes.splice(idx, 1,
          makeBox(box.pixels.slice(0, mid)),
          makeBox(box.pixels.slice(mid)));
      }
      return boxes.map(function (b) {
        var r = 0, g = 0, bl = 0, n = b.pixels.length;
        for (var i = 0; i < n; i++) { r += b.pixels[i][0]; g += b.pixels[i][1]; bl += b.pixels[i][2]; }
        return [Math.round(r / n), Math.round(g / n), Math.round(bl / n)];
      });
    }

    function makeBox(pixels) {
      var min = [255, 255, 255], max = [0, 0, 0];
      for (var i = 0; i < pixels.length; i++) {
        for (var c = 0; c < 3; c++) {
          var v = pixels[i][c];
          if (v < min[c]) min[c] = v;
          if (v > max[c]) max[c] = v;
        }
      }
      var rr = max[0] - min[0], rg = max[1] - min[1], rb = max[2] - min[2];
      var range = Math.max(rr, rg, rb);
      var axis = range === rr ? 0 : (range === rg ? 1 : 2);
      return { pixels: pixels, range: range, axis: axis };
    }

    function quantizeFrame(data, palette) {
      var n = data.length / 4;
      var out = new Uint8Array(n);
      var cache = new Map();
      for (var i = 0, j = 0; i < n; i++, j += 4) {
        var key = (data[j] << 16) | (data[j + 1] << 8) | data[j + 2];
        var idx = cache.get(key);
        if (idx === undefined) {
          idx = nearest(data[j], data[j + 1], data[j + 2], palette);
          cache.set(key, idx);
        }
        out[i] = idx;
      }
      return out;
    }

    function nearest(r, g, b, palette) {
      var best = 0, bestD = Infinity;
      for (var i = 0; i < palette.length; i++) {
        var c = palette[i];
        var dr = r - c[0], dg = g - c[1], db = b - c[2];
        var d = dr * dr + dg * dg + db * db;
        if (d < bestD) { bestD = d; best = i; if (d === 0) break; }
      }
      return best;
    }

    // GIF-style variable-width LZW, emitted as 255-byte sub-blocks.
    function lzwEncode(indices, minCodeSize, out) {
      var clearCode = 1 << minCodeSize;
      var eoiCode = clearCode + 1;
      var codeSize = minCodeSize + 1;
      var dict, nextCode;
      function resetDict() {
        dict = new Map();
        for (var i = 0; i < clearCode; i++) dict.set('' + i, i);
        nextCode = clearCode + 2;
        codeSize = minCodeSize + 1;
      }

      var buf = 0, bits = 0;
      var block = [];
      function flushBlock() {
        out.push(block.length);
        for (var i = 0; i < block.length; i++) out.push(block[i]);
        block = [];
      }
      function emit(code) {
        buf |= code << bits;
        bits += codeSize;
        while (bits >= 8) {
          block.push(buf & 0xff);
          buf >>= 8;
          bits -= 8;
          if (block.length === 255) flushBlock();
        }
      }

      resetDict();
      emit(clearCode);
      var prefix = '' + indices[0];
      for (var k = 1; k < indices.length; k++) {
        var c = indices[k];
        var combined = prefix + ',' + c;
        if (dict.has(combined)) {
          prefix = combined;
        } else {
          emit(dict.get(prefix));
          if (nextCode === 4096) {
            emit(clearCode);
            resetDict();
          } else {
            if (nextCode >= (1 << codeSize) && codeSize < 12) codeSize++;
            dict.set(combined, nextCode++);
          }
          prefix = '' + c;
        }
      }
      emit(dict.get(prefix));
      emit(eoiCode);
      if (bits > 0) block.push(buf & 0xff);
      if (block.length) flushBlock();
      out.push(0); // block terminator
    }
  })();
